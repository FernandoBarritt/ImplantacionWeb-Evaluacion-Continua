<body>
    <h1>Contacto</h1>
    <div class="Contenedor-contacto">

        <div class="Contenedor-texto">
            <p><span>¿Tienes alguna pregunta? </span><br> Contacta con el centro de comandos de <span>Nova.</span><br> (Atención al cliente)</p>
            <form action="Contacto">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>
                <br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <br>
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" required></textarea>
                <br>
                <button type="submit">Enviar</button>
            </form>
        </div>

        <div class="Contenedor-imagen">
            <img src="styles/IMG/Nova_Contact2.png" alt="Imagen de chica al teléfono en la tienda de Nova">
        </div>


        
    </div>
</body>
